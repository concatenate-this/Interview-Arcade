<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game — Interview Arcade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #111010;
      --ink-muted: #6b6b6b;
      --paper: #faf9f6;
      --paper-off: #f1efe8;
      --accent: #c84b2f;
      --accent-soft: #f5ece8;
      --rule: #d8d6cf;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --card-w: min(20vw, 104px);
      --max: 520px;
    }

    body {
      font-family: var(--font-body);
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      line-height: 1.5;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      padding: 0 1.5rem;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-brand {
      font-family: var(--font-display);
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-brand span { color: var(--accent); }
    .nav-back {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
    }
    .nav-back:hover { color: var(--accent); }

    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 5rem 1.25rem 3rem;
    }

    .page-eyebrow {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }
    .sub {
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
    }

    .hud {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }
    .hud-card {
      background: var(--paper-off);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 0.85rem 1rem;
    }
    .hud-card .label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .hud-card .val {
      font-family: var(--font-display);
      font-size: 1.65rem;
      line-height: 1.15;
    }

    .actions-top { margin-bottom: 1rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 3px;
      border: 1px solid var(--rule);
      background: var(--ink);
      color: var(--paper);
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: var(--accent); }

    .board {
      display: grid;
      grid-template-columns: repeat(4, var(--card-w));
      grid-template-rows: repeat(4, calc(var(--card-w) * 1.12));
      gap: 8px;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .card {
      width: var(--card-w);
      height: calc(var(--card-w) * 1.12);
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 6px;
      user-select: none;
      -webkit-user-select: none;
      /* Perspective on wrapper — required for child rotateY; avoid <button> (breaks 3D in Chrome/Safari). */
      perspective: 900px;
      -webkit-perspective: 900px;
    }
    .card:focus {
      outline: none;
    }
    .card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .card--done {
      cursor: default;
      pointer-events: none;
    }
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.5s ease;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      border-radius: 6px;
      transform: rotateY(0deg);
      will-change: transform;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6px;
      border-radius: 6px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      font-size: clamp(0.62rem, 2.1vw, 0.78rem);
      font-weight: 500;
      line-height: 1.25;
      border: 1px solid var(--rule);
      box-sizing: border-box;
    }
    .card-back {
      background: linear-gradient(145deg, var(--paper-off) 0%, #e8e4dc 100%);
      color: var(--accent);
      font-family: var(--font-display);
      font-size: 1.1rem;
      letter-spacing: 0.02em;
      transform: rotateY(0deg);
    }
    .card-front {
      background: var(--paper);
      color: var(--ink);
      transform: rotateY(180deg);
      border-color: var(--ink-muted);
    }
    .card.matched .card-face {
      opacity: 0.88;
      border-color: #2a6b2a;
      background: #e8f5e8;
    }

    .win-banner {
      background: var(--accent-soft);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }
    .win-banner strong {
      font-family: var(--font-display);
      font-size: 1.1rem;
      display: block;
      margin-bottom: 0.35rem;
      color: var(--ink);
    }

    @media (max-width: 380px) {
      :root { --card-w: min(21vw, 96px); }
    }
  </style>
</head>
<body>

  <nav>
    <a href="../index.html" class="nav-brand">Interview <span>Arcade</span></a>
    <a href="../modules.html" class="nav-back">← Modules</a>
  </nav>

  <main>
    <div class="page-eyebrow">Module 02 · Game</div>
    <h1>Memory Card Game</h1>
    <p class="sub">Flip two cards at a time to match related CS terms (e.g. Stack with LIFO). Unmatched cards flip back. Match all eight pairs to finish.</p>

    <div class="actions-top">
      <button type="button" class="btn" id="btnNew">New game</button>
    </div>

    <div class="hud">
      <div class="hud-card">
        <div class="label">Attempts</div>
        <div class="val" id="attempts">0</div>
      </div>
      <div class="hud-card">
        <div class="label">Time</div>
        <div class="val" id="timer">00:00</div>
      </div>
    </div>

    <div class="win-banner" id="winBanner" hidden>
      <strong>All pairs matched</strong>
      You finished in <span id="finalTime">00:00</span> with <span id="finalAttempts">0</span> attempts. Play again?
    </div>

    <div class="board" id="board" role="grid" aria-label="Memory card grid"></div>
  </main>

  <script src="../games/memory.js"></script>
</body>
</html>
